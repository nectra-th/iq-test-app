<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IQ Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <div class="start-icon">🧠</div>
            <h1>IQ Test</h1>
            <p class="subtitle">Pattern Recognition Assessment</p>
            <div class="start-card">
                <p class="description">Find the missing pattern. No reading required.</p>
                <div class="start-features">
                    <span class="feature-tag">🎯 Non-verbal</span>
                    <span class="feature-tag">📊 Adaptive</span>
                    <span class="feature-tag">⚡ 25 Questions</span>
                </div>
            </div>
            <p class="disclaimer">* For entertainment purposes only</p>
            <button id="start-btn" class="btn btn-primary"><span>Start →</span></button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="question-number">1 / 25</span>
                    <span id="timer">⏱ 00:00</span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
            <div class="question-area">
                <div id="question-visual" class="question-visual"></div>
                <div id="choices" class="choices visual-choices"></div>
            </div>
            <button id="next-btn" class="btn btn-primary" disabled>Next →</button>
        </div>

        <div id="result-screen" class="screen">
            <h1>Your Result</h1>
            <div class="result-card">
                <div class="score-section">
                    <div id="iq-score" class="iq-score"></div>
                    <div id="iq-label" class="iq-label"></div>
                </div>
                <div id="iq-description" class="iq-description"></div>
                <div class="stats">
                    <div class="stat-pill">
                        <span class="stat-icon">✓</span>
                        <span class="stat-value" id="correct-count"></span>
                        <span class="stat-label">Correct</span>
                    </div>
                    <div class="stat-pill">
                        <span class="stat-icon">⏱</span>
                        <span class="stat-value" id="total-time"></span>
                        <span class="stat-label">Time</span>
                    </div>
                </div>
            </div>
            <button id="retry-btn" class="btn btn-primary">Try Again ↻</button>
        </div>
    </div>

    <script src="svg-engine.js"></script>
    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
